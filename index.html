<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Pregunta de Programación</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 40px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .code-container {
            background-color: #2d2d2d;
            color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            font-family: Consolas, monospace;
            font-size: 15px;
            margin-bottom: 30px;
            width: fit-content;
        }

        .line-number {
            color: #888;
            display: inline-block;
            width: 25px;
        }

        .keyword {
            color: #569CD6;
        }

        .number {
            color: #B5CEA8;
        }

        .question {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .options {
            background: #fff;
            border-radius: 6px;
            padding: 15px;
            width: 300px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .option {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }

        .option:last-child {
            border-bottom: none;
        }

        .option input {
            margin-right: 10px;
        }

        .option:hover {
            background-color: #f9f9f9;
        }

        .hidden-equal {
            opacity: 0;
        }

        .correct {
            background-color: #d4edda !important;
            border: 1px solid #28a745;
        }

        .incorrect {
            background-color: #f8d7da !important;
            border: 1px solid #dc3545;
        }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Ejercicio de Programación</h2>

    <div class="code-container">
        <div> resultado = <span class="number">0</span></div>
        <div> <span class="keyword">for</span> x <span class="keyword">in</span> [<span class="number">3</span>,<span
                class="number">3</span>,<span class="number">5</span>]:</div>
        <div>
            &nbsp;&nbsp;&nbsp;&nbsp;
            <span class="keyword">if</span> x &gt;<span class="hidden-equal">=</span><span class="number">3</span>:
        </div>
        <div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; resultado = resultado - x</div>
        <div>&nbsp;&nbsp;&nbsp;&nbsp;<span class="keyword">else</span>:</div>
        <div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; resultado = resultado + x</div>
    </div>

    <div class="question">
        ¿Cuál es el resultado?
    </div>

    <div class="options">
        <label class="option">
            <input type="radio" name="respuesta" value="0">
            0
        </label>

        <label class="option">
            <input type="radio" name="respuesta" value="1">
            1
        </label>

        <label class="option">
            <input type="radio" name="respuesta" value="-11">
            -11
        </label>

        <label class="option">
            <input type="radio" name="respuesta" value="-10">
            -10
        </label>

    </div>
    <br>
    <button onclick="verificarRespuesta()">Verificar respuesta</button>

    <div id="feedback" class="feedback"></div>
    <script>
        function verificarRespuesta() {

            const opciones = document.querySelectorAll('input[name="respuesta"]');
            let seleccionada = null;

            opciones.forEach(op => {
                if (op.checked) {
                    seleccionada = op;
                }
            });

            if (!seleccionada) {
                alert("Selecciona una opción");
                return;
            }

            const correcta = "1";
            const feedback = document.getElementById("feedback");

            // Limpiar estilos previos
            document.querySelectorAll(".option").forEach(opt => {
                opt.classList.remove("correct", "incorrect");
            });

            if (seleccionada.value === correcta) {

                seleccionada.parentElement.classList.add("correct");
                feedback.innerHTML = "✅ Correcto.";

            } else {

                seleccionada.parentElement.classList.add("incorrect");
                feedback.innerHTML = "❌ Incorrecto.";
            }
        }
    </script>

</body>

</html>
